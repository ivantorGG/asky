<!DOCTYPE html>
<html data-bs-theme="dark">
    <head>
        <title>Список ваших мероприятий</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="container mt-5">
        <div class="container">
            <nav class="navbar navbar-expand-lg bg-dark navbar-dark sticky-top shadow-sm">
            <div class="d-flex justify-content-end mb-4">
            <button class="btn btn-outline-secondary rounded-circle d-flex justify-content-center align-items-center" 
                style="width: 40px; height: 40px;" 
                onclick="toggleTheme()" 
                title="Переключить тему">
                <span line-height="1" id="theme-icon" style="line-height: 1; font-size: 150%;">☀️</span>
            </button>
            </div>
        </nav>
        
        </div>
        
        
        <div class="row justify-content-center">
            <div class="card shadow-sm mb-5">
                <div class="card-body p-4 d-flex justify-content-between align-items-center">
                    <h2 class="card-title mb-0">Англиийский язык бла бла бла бла бла</h2>
                    <button type="button" class="btn btn-primary btn-lg w-100 ms-5">Открыть</button>
                </div>
            </div>
            <div class="card shadow-sm mb-5">
                <div class="card-body p-4 d-flex justify-content-between align-items-center">
                    <h2 class="card-title mb-0">Англиийский язык бла бла бла бла бла</h2>
                    <button type="button" class="btn btn-primary btn-lg w-100 ms-5">Открыть</button>
                </div>
            </div>
            <div class="card shadow-sm mb-5">
                <div class="card-body p-4 d-flex justify-content-between align-items-center">
                    <h2 class="card-title mb-0">Англиийский язык бла бла бла бла бла</h2>
                    <button type="button" class="btn btn-primary btn-lg w-100 ms-5">Открыть</button>
                </div>
            </div>
            <div class="card shadow-sm mb-5">
                <div class="card-body p-4 d-flex justify-content-between align-items-center">
                    <h2 class="card-title mb-0">Англиийский язык бла бла бла бла бла</h2>
                    <button type="button" class="btn btn-primary btn-lg w-100 ms-5">Открыть</button>
                </div>
            </div>
        </div>

        <button type="button" class="btn btn-success rounded-circle position-fixed bottom-0 end-0 m-4 shadow-lg" data-bs-toggle="modal" data-bs-target="#newEventModal" style="width: 60px; height: 60px;">
            <div class="d-flex justify-content-center align-items-center">
                <h1 class="mb-0 text-light">+</h1>
            </div>
        </button>
        
        <div class="modal fade" id="newEventModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="exampleModalLabel">Новое мероприятие</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                    </div>
                    
                    <div class="modal-body">
                        <form>
                            <div class="mb-3">
                                <label for="eventName" class="form-label">Название мероприятия</label>
                                <input type="text" class="form-control" id="eventName" placeholder="Например: Лекция по физике">
                            </div>
                        </form>
                    </div>
                    
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="button" class="btn btn-primary">Сохранить</button>
                    </div>
                    
                </div>
            </div>
        </div>
    



        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
