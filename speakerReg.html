<!DOCTYPE html>
<html data-bs-theme="dark">
    <head>
        <title>Регистрация спикера</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="container mt-5">
        <div class="row justify-content-center">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4">Регистрация</h2>
                    <form action="/register" method="POST">
                        <div class="mb-3 d-flex">
                            <label for="email">Email:</label>
                            <input class="ms-auto h-25" type="email" id="email" name="email" required>
                        </div>
                        
                        <div class="mb-3 d-flex">
                            <label for="password">Пароль (длиной как минимум 6 символов):</label>
                            <input class="ms-auto h-25" type="password" id="password" name="password" required minlength="6">
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">Зарегистрироваться</button>
                        </div>
                        
                    </form>
                </div>
            </div>
           
        </div>
    </body>
</html>
