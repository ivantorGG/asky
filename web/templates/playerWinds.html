<main class="page">

<div class="pageGrid">

<!-- =======================================================

class="questionForm"
id="questionForm">

rows="1"

required></textarea>

<!-- Боковая панель комментариев -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="commentsOffcanvas" style="border-radius: 18px;">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title">Комментарии</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
      <div id="questionStatsInPanel" class="d-flex gap-2 mb-3 align-items-center">
          <!-- динамически заполним -->
      </div>
    <div id="commentsList">
      <p class="text-muted">Комментариев пока нет</p>
    </div>
    <form id="commentForm" class="mt-3" style="border-radius: 20px;">
      <input type="text" id="commentInput" class="form-control mb-2" placeholder="Напишите комментарий...">
      <button type="submit" class="btn btn-primary w-100">Отправить</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>

const pathParts = window.location.pathname.split('/');
const uuidMatch = window.location.pathname.match(/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/);
const eventCode = uuidMatch ? uuidMatch[0] : (pathParts[2] || '');
const API_BASE = '/api';

let currentQuestionId = null;

// дальше код без изменений...
// ---------------------- API -------------------------------

async function getQuestions() {
  try {
    const url = `${API_BASE}/events/${eventCode}/questions`;
    console.debug('Fetching questions from', url);
    const resp = await fetch(url);

if (!resp.ok) {
    console.log(await resp.text());
    throw new Error(`Ошибка загрузки: ${resp.status}`);
}
    return await resp.json();
  } catch (e) {
    console.error(e);
    return [];
  }
}

async function addQuestion(text) {
  const resp = await fetch(`${API_BASE}/events/${eventCode}/questions`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      text
    })
  });

  if (!resp.ok)
    throw new Error("Ошибка добавления");

  return await resp.json();
}

async function likeQuestion(id) {

  const resp = await fetch(`${API_BASE}/questions/${id}/vote`, {
    method: "PUT"
  });

  if (!resp.ok)
    throw new Error("Ошибка лайка");

  return await resp.json();
}

async function unlikeQuestion(id) {

  const resp = await fetch(`${API_BASE}/questions/${id}/vote`, {
    method: "DELETE"
  });

  if (!resp.ok)
    throw new Error("Ошибка");

  return await resp.json();
}

function getVotedQuestions(){
  try{
    const raw = localStorage.getItem('voted_questions');
    return raw? JSON.parse(raw) : [];
  }catch(e){return []}
}

function isQuestionVoted(id){
  const arr = getVotedQuestions();
  return arr.indexOf(id) !== -1;
}

function addVotedQuestion(id){
  const arr = getVotedQuestions();
  if(arr.indexOf(id) === -1){ arr.push(id); localStorage.setItem('voted_questions', JSON.stringify(arr)); }
}

function removeVotedQuestion(id){
  let arr = getVotedQuestions();
  arr = arr.filter(x => x !== id);
  localStorage.setItem('voted_questions', JSON.stringify(arr));
}

async function getComments(id) {

  const resp = await fetch(`${API_BASE}/questions/${id}/comments`);

  if (!resp.ok)
    throw new Error("Ошибка");

  return await resp.json();
}

async function addComment(id, text) {

  const resp = await fetch(`${API_BASE}/questions/${id}/comments`, {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      text
    })

  });

  if (!resp.ok)
    throw new Error("Ошибка");

  return await resp.json();

}

// ---------------------- РЕНДЕР -------------------------------

async function updateSingleQuestionUI(questionId) {
  // Запрашиваем свежие данные вопроса
  const resp = await fetch(`${API_BASE}/questions/${questionId}`);
  if (!resp.ok) return;
  const q = await resp.json();
  
  // Обновляем кнопку в общем списке
  const listItem = document.querySelector(`.list-group-item[data-id="${questionId}"]`);
  if (listItem) {
    const likeBtn = listItem.querySelector('.like-btn');
    if (likeBtn) {
      const likes = q.votes || 0;
      const liked = q.is_voted || false;
      likeBtn.className = `btn btn-sm ${liked ? 'btn-primary' : 'btn-outline-primary'} like-btn`;
      likeBtn.querySelector('.like-count').textContent = likes;
    }
    const commentBtn = listItem.querySelector('.comment-btn .comment-count');
    if (commentBtn) {
      commentBtn.textContent = q.comments_count ?? 0;
    }
  }

  // Обновляем статистику в боковой панели, если она открыта и относится к этому вопросу
  if (currentQuestionId === questionId) {
    const statsDiv = document.getElementById('questionStatsInPanel');
    if (statsDiv) {
      const likes = q.votes || 0;
      const liked = q.is_voted || false;
      const commCount = q.comments_count ?? 0;
      statsDiv.innerHTML = `
        <button class="btn btn-sm ${liked ? 'btn-primary' : 'btn-outline-primary'} like-btn" data-id="${questionId}">
          👍 <span class="like-count">${likes}</span>
        </button>
        <span>💬 <span class="comment-count">${commCount}</span> комментариев</span>
      `;
    }
  }

  container.innerHTML = "";

  questions.forEach(q => {

    const liked = q.is_voted || isQuestionVoted(q.id);

    const likes = q.votes || 0;

    const comments = q.comments
      ? q.comments.length
      : (q.comments_count || 0);

    container.insertAdjacentHTML("beforeend", `

<div class="questionCard" data-id="${q.id}">

<div class="questionText">

${q.text}

</div>

<div class="questionActions">

<div class="answerBadgeWrapper">

${q.answered ? `
<span class="answeredBadge">
    <i class="bi bi-check-circle-fill"></i>
    Отвечено
</span>
` : ""}

</div>

<div class="actionGroup">

<button
class="iconButton likeButton ${liked ? "active" : ""}"
data-id="${q.id}">

<i class="bi bi-heart-fill"></i>

<span class="likeCount">

${likes}

</span>

</button>


<button
class="iconButton commentButton"
data-id="${q.id}">

<i class="bi bi-chat-dots-fill"></i>

<span class="commentCount">

${comments}

</span>

</button>

</div>

</div>

</div>

`);

  });

}

// ---------------------- КОММЕНТАРИИ ----------------------------

async function openComments(questionId) {
  currentQuestionId = questionId;
  try {
    // Загружаем комментарии
    const comments = await getComments(questionId);
    // Загружаем сам вопрос для статистики (предположим, есть эндпоинт /api/questions/{id})
    const questionResp = await fetch(`${API_BASE}/questions/${questionId}`);
    const questionData = questionResp.ok ? await questionResp.json() : {};
    
    const container = document.getElementById('commentsList');
    if (!comments || comments.length === 0) {
      container.innerHTML = '<p class="text-muted">Комментариев пока нет</p>';
    } else {
      await likeQuestion(id);
      addVotedQuestion(id);
    }

    // Отображаем статистику в панели
    const statsDiv = document.getElementById('questionStatsInPanel');
    if (questionData) {
      const likes = questionData.votes || 0;
      const liked = questionData.is_voted || false;
      const commCount = questionData.comments_count ?? (comments ? comments.length : 0);
      statsDiv.innerHTML = `
        <button class="btn btn-sm ${liked ? 'btn-primary' : 'btn-outline-primary'} like-btn" data-id="${questionId}">
          👍 <span class="like-count">${likes}</span>
        </button>
        <span>💬 <span class="comment-count">${commCount}</span> комментариев</span>
      `;
    }

    const offcanvas = new bootstrap.Offcanvas(document.getElementById('commentsOffcanvas'));
    offcanvas.show();
  } catch (e) {
    console.error('openComments:', e);
  }
}
// ---------------------- ОБРАБОТЧИКИ ---------------------------

document.addEventListener('click', async function(e) {
  const btn = e.target.closest('.like-btn');
  if (btn) {
    e.preventDefault();
    const id = Number(btn.dataset.id);
    const isLiked = btn.classList.contains('btn-primary');
    try {
      if (isLiked) await unlikeQuestion(id);
      else await likeQuestion(id);
      await updateSingleQuestionUI(id);   // вместо renderQuestions()
    } catch (e) { alert('Ошибка лайка'); }
  }

});

document.addEventListener("click", e => {

  const btn = e.target.closest(".commentButton");

  if (!btn)
    return;

  openComments(Number(btn.dataset.id));

});

document.getElementById("questionForm")
.addEventListener("submit", async e => {

  e.preventDefault();

  const input = document.getElementById("input2");

  const text = input.value.trim();
  if (!text || currentQuestionId === null) return;
  try {
    await addComment(currentQuestionId, text);
    // Перезагружаем список комментариев в панели и статистику
    await openComments(currentQuestionId); // это заново всё отрисует и обновит статистику
    // Точечно обновим основной список (или просто renderQuestions, если не жалко)
    await updateSingleQuestionUI(currentQuestionId);
    input.value = '';
  } catch (e) { alert('Ошибка добавления комментария'); }
});

renderQuestions();

</script>

<script src="/static/js/playerWinds.js"></script>
<script src="/static/js/themeSwitcher.js"></script>

</body>

</html>
