<!-- ===== БОКОВАЯ ПАНЕЛЬ ДЛЯ КОММЕНТАРИЕВ ===== -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="commentsOffcanvas">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title">Комментарии</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <div id="commentsList">
      <p class="text-muted">Комментариев пока нет</p>
    </div>
    <form id="commentForm" class="mt-3">
      <input type="text" id="commentInput" class="form-control mb-2" placeholder="Напишите комментарий...">
      <button type="submit" class="btn btn-primary w-100">Отправить</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
 // ========== КОД КОММЕНТАРИЕВ (ТВОЙ) ==========
  function getQuestions() {
    return JSON.parse(localStorage.getItem('questions')) || [];
  }
  function saveQuestions(qs) {
    localStorage.setItem('questions', JSON.stringify(qs));
  }

  let currentQuestionId = null;

  function openComments(questionId) {
    currentQuestionId = questionId;
    const qs = getQuestions();
    const q = qs.find(item => item.id === questionId);
    if (!q) return;

    const container = document.getElementById('commentsList');
    if (!q.comments || q.comments.length === 0) {
      container.innerHTML = '<p class="text-muted">Комментариев пока нет</p>';
    } else {
      container.innerHTML = q.comments.map(c => `
        <div class="border-bottom pb-2 mb-2">
          <div class="d-flex justify-content-between">
            <strong>Аноним</strong>
            <small class="text-muted">${c.timestamp}</small>
          </div>
          <p class="mb-1">${c.text}</p>
        </div>
      `).join('');
    }
    const offcanvas = new bootstrap.Offcanvas(document.getElementById('commentsOffcanvas'));
    offcanvas.show();
  }

  function addCommentToQuestion(questionId, text) {
    const qs = getQuestions();
    const q = qs.find(item => item.id === questionId);
    if (!q) return;
    if (!q.comments) q.comments = [];
    q.comments.push({
      id: Date.now(),
      text: text.trim(),
      timestamp: new Date().toLocaleString()
    });
    saveQuestions(qs);
    updateCommentCounts();
    openComments(questionId);
  }

  function updateCommentCounts() {
    const qs = getQuestions();
    document.querySelectorAll('.comment-btn').forEach(btn => {
      const id = Number(btn.dataset.id);
      const q = qs.find(item => item.id === id);
      const count = q && q.comments ? q.comments.length : 0;
      const span = btn.querySelector('.comment-count');
      if (span) span.textContent = count;
    });
  }

  document.addEventListener('click', function(e) {
    const btn = e.target.closest('.comment-btn');
    if (btn) {
      e.preventDefault();
      const id = Number(btn.dataset.id);
      if (id) openComments(id);
    }
  });

  document.getElementById('commentForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const input = document.getElementById('commentInput');
    const text = input.value.trim();
    if (!text || currentQuestionId === null) return;
    addCommentToQuestion(currentQuestionId, text);
    input.value = '';
  });

  // ===== НОВАЯ ИНИЦИАЛИЗАЦИЯ (создаём вопросы из разметки) =====
  function initQuestionsFromDOM() {
    const existing = getQuestions();
    if (existing.length > 0) return; // уже есть – не трогаем

    const items = document.querySelectorAll('.list-group-item');
    const questions = [];
    items.forEach(el => {
      const id = Number(el.dataset.id);
      const textEl = el.querySelector('.question-text');
      const text = textEl ? textEl.textContent.trim() : 'Вопрос без текста';
      if (id) {
        questions.push({ id, text, likes: 0, liked: false, comments: [] });
      }
    });
    saveQuestions(questions);
  }
  initQuestionsFromDOM();

  // Обновляем счётчики при загрузке
  updateCommentCounts();

  // ===== ДОБАВЛЯЕМ ОБРАБОТЧИК ДЛЯ НОВЫХ ВОПРОСОВ (опционально) =====
  document.getElementById('questionForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const textarea = document.getElementById('input2');
    const text = textarea.value.trim();
    if (!text) return;
    const questions = getQuestions();
    const newId = questions.length ? Math.max(...questions.map(q => q.id)) + 1 : 1;
    questions.push({
      id: newId,
      text: text,
      likes: 0,
      liked: false,
      comments: []
    });
    saveQuestions(questions);
    textarea.value = '';
    // Перезагружаем страницу, чтобы увидеть новый вопрос (или можно добавить динамически)
    location.reload();
  });
</script>
