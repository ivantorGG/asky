<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/web/static/css/playerWinds.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>asky</title>
    <style>
        body { padding-bottom: 100px; }
        .fixed-bottom-form {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: transparent;
            padding: 10px 0;
            z-index: 1000;
        }
        .fixed-bottom-form .form-group {
            display: flex;
            gap: 8px;
            align-items: center;
            background: white;
            padding: 8px 16px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .fixed-bottom-form textarea {
            flex: 1;
            border-radius: 20px;
            resize: none;
            padding: 8px 16px;
            height: 44px;
            border: 1px solid #ddd;
        }
        .fixed-bottom-form button {
            height: 44px;
            padding: 0 24px;
            border-radius: 20px;
            background: #6c5ce7;
            border: none;
            color: white;
            font-weight: 600;
        }
    </style>
</head>
<body>

<header>
  <div class="container-header-glav">
    <div class="blok-header-one">
      <h4>Asky</h4>
    </div>
    <div class="blok-header-two">
      <p>{фамилия имя}</p>
    </div>
  </div>
</header>

<div style=" width: 140px; height: 140px; margin-left: 10%; position: fixed; margin-top: 100px;"  >
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/QR_Code_example.png" alt="" style="display: flex; width: 140px; height: 140px; box-shadow: 0 8px 24px rgba(0,0,0,0.15);">
    <a href="https://upload.wikimedia.org/wikipedia/commons/5/5e/QR_Code_example.png" style="display: block; text-decoration: none; margin-left: 5px;">ссылка на лекцию</a>
</div>

<div class="container mt-4" id="questionsContainer">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <h4 class="mb-3">Вопросы</h4>
      <div style="border: 1px solid #dddddd00; border-radius: 8px; padding: 10px;">
        <div class="list-group" id="questionsList">
          <!-- Сюда динамически будут вставляться вопросы -->
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Форма внизу -->
<form class="fixed-bottom-form" id="questionForm">
  <div class="form-group">
    <textarea id="input2" rows="1" placeholder="Напишите вопрос анонимно..." required></textarea>
    <button type="submit">Отправить</button>
  </div>
</form>

<!-- Боковая панель комментариев -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="commentsOffcanvas" style="border-radius: 18px;">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title">Комментарии</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <div id="commentsList">
      <p class="text-muted">Комментариев пока нет</p>
    </div>
    <form id="commentForm" class="mt-3" style="border-radius: 20px;">
      <input type="text" id="commentInput" class="form-control mb-2" placeholder="Напишите комментарий...">
      <button type="submit" class="btn btn-primary w-100">Отправить</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ================================================================
//  ФРОНТЕНД С ПЕРЕДАЧЕЙ {code} В ПУТИ
// ================================================================

const pathParts = window.location.pathname.split('/');
const eventCode = pathParts[2]; // /events/XXXXX/student
const API_BASE = '/api';
let currentQuestionId = null;

// ---------------------- API-ВЫЗОВЫ -------------------------------

// Получить вопросы (GET /api/events/{code}/questions)
async function getQuestions() {
  try {
    const resp = await fetch(`${API_BASE}/events/${eventCode}/questions`);
    if (!resp.ok) throw new Error(`Ошибка загрузки: ${resp.status}`);
    return await resp.json();
  } catch (e) {
    console.error('getQuestions:', e);
    return [];
  }
}

// Создать вопрос (POST /api/events/{code}/questions)
async function addQuestion(text) {
  try {
    const resp = await fetch(`${API_BASE}/events/${eventCode}/questions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!resp.ok) throw new Error(`Ошибка добавления: ${resp.status}`);
    return await resp.json();
  } catch (e) {
    console.error('addQuestion:', e);
    throw e;
  }
}

// Лайк (PUT /api/questions/{id}/vote)
async function likeQuestion(id) {
  const resp = await fetch(`${API_BASE}/questions/${id}/vote`, { method: 'PUT' });
  if (!resp.ok) throw new Error('Ошибка лайка');
  return resp.json();
}

// Снять лайк (DELETE /api/questions/{id}/vote)
async function unlikeQuestion(id) {
  const resp = await fetch(`${API_BASE}/questions/${id}/vote`, { method: 'DELETE' });
  if (!resp.ok) throw new Error('Ошибка снятия лайка');
  return resp.json();
}

// Получить комментарии (GET /api/questions/{id}/comments)
async function getComments(id) {
  const resp = await fetch(`${API_BASE}/questions/${id}/comments`);
  if (!resp.ok) throw new Error('Ошибка загрузки комментариев');
  return resp.json();
}

// Добавить комментарий (POST /api/questions/{id}/comments)
async function addComment(id, text) {
  const resp = await fetch(`${API_BASE}/questions/${id}/comments`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text })
  });
  if (!resp.ok) throw new Error('Ошибка добавления комментария');
  return resp.json();
}

// ---------------------- ОТРИСОВКА -------------------------------

async function renderQuestions() {
  const container = document.getElementById('questionsList');
  if (!container) return;
  try {
    const questions = await getQuestions();
    if (questions.length === 0) {
      container.innerHTML = '<p class="text-muted text-center">Пока нет вопросов. Будьте первым!</p>';
      return;
    }
    let html = '';
    questions.forEach(q => {
      const likes = q.votes || 0;
      const liked = q.is_voted || false;
      const commentsCount = q.comments ? q.comments.length : (q.comments_count || 0);
      html += `
        <div class="list-group-item" data-id="${q.id}">
          <span class="question-text">${q.text}</span>
          <button class="btn btn-sm ${liked ? 'btn-primary' : 'btn-outline-primary'} like-btn" data-id="${q.id}">
            👍 <span class="like-count">${likes}</span>
          </button>
          <button class="btn btn-sm btn-outline-secondary comment-btn" data-id="${q.id}">
            💬 <span class="comment-count">${commentsCount}</span>
          </button>
        </div>
      `;
    });
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = '<p class="text-danger">Не удалось загрузить вопросы</p>';
  }
}

// ---------------------- КОММЕНТАРИИ ---------------------------

async function openComments(questionId) {
  currentQuestionId = questionId;
  try {
    const comments = await getComments(questionId);
    const container = document.getElementById('commentsList');
    if (!comments || comments.length === 0) {
      container.innerHTML = '<p class="text-muted">Комментариев пока нет</p>';
    } else {
      container.innerHTML = comments.map(c => `
        <div class="border-bottom pb-2 mb-2">
          <div class="d-flex justify-content-between">
            <strong>Аноним</strong>
            <small class="text-muted">${new Date(c.timestamp).toLocaleString()}</small>
          </div>
          <p class="mb-1">${c.text}</p>
        </div>
      `).join('');
    }
    new bootstrap.Offcanvas(document.getElementById('commentsOffcanvas')).show();
  } catch (e) {
    console.error('openComments:', e);
  }
}

// ---------------------- ОБРАБОТЧИКИ ---------------------------

document.addEventListener('click', async function(e) {
  const btn = e.target.closest('.like-btn');
  if (btn) {
    e.preventDefault();
    const id = Number(btn.dataset.id);
    const isLiked = btn.classList.contains('btn-primary');
    try {
      if (isLiked) await unlikeQuestion(id);
      else await likeQuestion(id);
      await renderQuestions();
    } catch (e) { alert('Ошибка лайка'); }
  }
});

document.addEventListener('click', function(e) {
  const btn = e.target.closest('.comment-btn');
  if (btn) {
    e.preventDefault();
    const id = Number(btn.dataset.id);
    if (id) openComments(id);
  }
});

document.getElementById('questionForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const text = document.getElementById('input2').value.trim();
  if (!text) return;
  try {
    await addQuestion(text);
    await renderQuestions();
    document.getElementById('input2').value = '';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  } catch (e) { alert('Ошибка добавления вопроса'); }
});

document.getElementById('commentForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if (!text || currentQuestionId === null) return;
  try {
    await addComment(currentQuestionId, text);
    await openComments(currentQuestionId);
    await renderQuestions();
    input.value = '';
  } catch (e) { alert('Ошибка добавления комментария'); }
});

renderQuestions();
</script>
</body>
</html>
