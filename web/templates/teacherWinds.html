<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ASKY</title>

    <link rel="stylesheet" href="/static/css/teacherWinds.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

</head>

<body>

<canvas id="particles"></canvas>

<div class="gradient gradient1"></div>
<div class="gradient gradient2"></div>
<div class="gradient gradient3"></div>

<header>

    <div class="logo">
        <span>ASKY</span>
    </div>

    <nav>

        <span id="email" class="userEmail"></span>

        <button id="themeToggle"
                class="themeToggle"
                type="button"
                aria-label="Переключить тему">

            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3v2m0 14v2m9-9h-2M5 12H3m9-6.5 1.4 1.4M9.6 14.4 8.2 15.8m8.6 0-1.4 1.4M9.6 9.6 8.2 8.2m6.8 0 1.4-1.4m-1.4 8.6 1.4 1.4"/>
            </svg>

        </button>

        <button class="logoutButton" onclick="logout()">

            <i class="bi bi-box-arrow-right"></i>

            Выйти

        </button>

    </nav>

</header>

<script src="/static/js/logout.js"></script>

<main class="page">

<div class="pageGrid">

<!-- =======================================================
LEFT
======================================================= -->

<aside class="leftColumn">

<div class="glassCard qrCard">

<h5>

<i class="bi bi-qr-code"></i>

QR мероприятия

</h5>

<img
class="qrImage"
src="https://upload.wikimedia.org/wikipedia/commons/5/5e/QR_Code_example.png">

<a
class="lectureLink"
href="https://upload.wikimedia.org/wikipedia/commons/5/5e/QR_Code_example.png">

<i class="bi bi-link-45deg"></i>

Открыть лекцию

</a>

<button class="refreshButton" type="button" onclick="window.location.reload();">

Обновить

</button>

</div>

</aside>

<!-- =======================================================
RIGHT
======================================================= -->

<section class="questionsColumn">

<div
class="questionsList"
id="questionsList">

</div>

</section>

</div>

</main>

<!--
У ПРЕПОДАВАТЕЛЯ НЕТ ФОРМЫ ОТПРАВКИ ВОПРОСА
-->

<div
class="offcanvas offcanvas-end"
tabindex="-1"
id="commentsOffcanvas">

<div class="offcanvas-header">

<h5>

<i class="bi bi-chat-dots"></i>

Комментарии

</h5>

<button
type="button"
class="btn-close"
data-bs-dismiss="offcanvas">

</button>

</div>

<div class="offcanvas-body">

<div id="commentsList">

<p class="text-muted">

Комментариев пока нет

</p>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>

const pathParts = window.location.pathname.split('/');

const uuidMatch = window.location.pathname.match(
/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/);

const eventCode = uuidMatch
? uuidMatch[0]
: (pathParts[2] || '');

const API_BASE = '/api';

let currentQuestionId = null;
// ---------------------- API -------------------------------

async function getQuestions() {

  try {

    const url = `${API_BASE}/events/${eventCode}/questions`;

    const resp = await fetch(url);

    if (!resp.ok)
      throw new Error(`Ошибка загрузки: ${resp.status}`);

    return await resp.json();

  } catch (e) {

    console.error(e);

    return [];

  }

}

async function getEmail() {

  try {

    const resp = await fetch(`${API_BASE}/email`);

    if (!resp.ok)
      throw new Error(`Ошибка загрузки: ${resp.status}`);

    return await resp.json();

  } catch (e) {

    console.error(e);

    return [];

  }

}

async function answerQuestion(id) {

  const resp = await fetch(

    `${API_BASE}/questions/${id}/answer`,

    {

      method: "PUT"

    }

  );

  if (!resp.ok)
    throw new Error("Ошибка");

  return null;

}

async function getComments(id) {

  const resp = await fetch(
    `${API_BASE}/questions/${id}/comments`
  );

  if (!resp.ok)
    throw new Error("Ошибка");

  return await resp.json();

}

// ---------------------- РЕНДЕР -------------------------------

async function renderQuestions() {

  const container = document.getElementById("questionsList");

  const questions = await getQuestions();

  if (!questions.length) {

    container.innerHTML = `

<div class="emptyQuestions">

<i class="bi bi-chat-left-dots"></i>

<h3>

Пока нет вопросов

</h3>

<p>

Будьте первым!

</p>

</div>

`;

    return;

  }

  container.innerHTML = "";

  questions.forEach(q => {

    const answered = q.answered || false;

    const comments = q.comments
      ? q.comments.length
      : (q.comments_count || 0);

    container.insertAdjacentHTML("beforeend", `

<div class="questionCard" data-id="${q.id}">

<div class="questionText">

${q.text}

</div>

<div class="questionActions">

<div class="actionGroup">

<button
class="iconButton answerButton ${answered ? "active" : ""}"
data-id="${q.id}">

<i class="bi bi-check2-circle"></i>

</button>

<button
class="iconButton commentButton"
data-id="${q.id}">

<i class="bi bi-chat-dots-fill"></i>

<span class="commentCount">

${comments}

</span>

</button>

</div>

</div>

</div>

`);

  });

}

async function setEmail() {

  try {

    const email = await getEmail();

    const emailInput = document.getElementById("email");

    if (emailInput) {

      emailInput.textContent = email;

    }

  } catch (error) {

    console.error(error);

  }

}
// ---------------------- КОММЕНТАРИИ ----------------------------

async function openComments(id) {

  currentQuestionId = id;

  const comments = await getComments(id);

  const list = document.getElementById("commentsList");

  if (!comments.length) {

    list.innerHTML =
      "<p class='text-muted'>Комментариев пока нет</p>";

  } else {

    list.innerHTML = comments.map(c => `

<div class="comment">

<div class="commentAuthor">

Аноним

</div>

<div class="commentText">

${c.text}

</div>

</div>

`).join("");

  }

  new bootstrap.Offcanvas(
    document.getElementById("commentsOffcanvas")
  ).show();

}

// ---------------------- СОБЫТИЯ ----------------------------

document.addEventListener("click", async e => {

  const answer = e.target.closest(".answerButton");

  if (!answer)
    return;

  const id = Number(answer.dataset.id);

  try {

    await answerQuestion(id);

    renderQuestions();

  } catch (err) {

    console.error(err);

  }

});

document.addEventListener("click", e => {

  const btn = e.target.closest(".commentButton");

  if (!btn)
    return;

  openComments(Number(btn.dataset.id));

});

renderQuestions();

setEmail();

</script>

<script src="/static/js/teacherWinds.js"></script>
<script src="/static/js/themeSwitcher.js"></script>

</body>

</html>
