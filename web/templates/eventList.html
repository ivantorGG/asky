<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ASKY | Мероприятия</title>

    <link rel="icon" href="/static/img/favicon.ico">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/static/css/events.css">

</head>

<body>

    <canvas id="particles"></canvas>

    <div class="gradient gradient1"></div>
    <div class="gradient gradient2"></div>
    <div class="gradient gradient3"></div>

    <header>

        <div class="logo">
            <span>ASKY</span>
        </div>

        <nav>

            <span id="email" class="userEmail"></span>

            <button id="themeToggle"
                    class="themeToggle"
                    type="button"
                    aria-label="Переключить тему">

                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 3v2m0 14v2m9-9h-2M5 12H3m9-6.5 1.4 1.4M9.6 14.4 8.2 15.8m8.6 0-1.4 1.4M9.6 9.6 8.2 8.2m6.8 0 1.4-1.4m-1.4 8.6 1.4 1.4"/>
                </svg>

            </button>

            <button class="logoutButton" onclick="logout()">

                <i class="bi bi-box-arrow-right"></i>

                Выйти

            </button>

        </nav>

    </header>

    <main class="eventsPage">

        <div class="container">

            <!-- Переключатель -->
            <div class="eventsTabs">

                <button
                    class="eventsTab active"
                    data-type="teacher">
                    Мои мероприятия
                </button>

                <button
                    class="eventsTab"
                    data-type="student">
                    Участвовал
                </button>

            </div>

            <!-- Список мероприятий -->
            <div
                class="row justify-content-center"
                id="events">
            </div>

        </div>

    </main>

    <!-- Кнопка создания -->

    <button
        type="button"
        class="createEventButton"
        data-bs-toggle="modal"
        data-bs-target="#newEventModal">

        <i class="bi bi-calendar-plus"></i>

    </button>

    <!-- Модальное окно -->

    <div
        class="modal fade"
        id="newEventModal"
        tabindex="-1"
        aria-hidden="true">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content glassModal">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Новое мероприятие
                    </h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <label class="form-label">
                        Название мероприятия
                    </label>

                    <input
                        id="eventName"
                        class="form-control"
                        type="text"
                        placeholder="Например: Лекция по физике">

                </div>

                <div class="modal-footer">

                    <button
                        class="btnCancel"
                        data-bs-dismiss="modal">

                        Отмена

                    </button>

                    <button
                        id="saveEvent"
                        class="btnCreate">

                        Создать

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/static/js/logout.js"></script>
    <script src="/static/js/navbar.js"></script>
    <script src="/static/js/themeSwitcher.js"></script>
    <script src="/static/js/eventEffects.js"></script>
    <script src="/static/js/eventList.js"></script>

</body>

</html>
