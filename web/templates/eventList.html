<!DOCTYPE html>
<html data-bs-theme="dark">
    <head>
        <title>Список ваших мероприятий</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="cards.css">
    </head>
    <body >

        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        
        <div class="container"> 
            <a class="navbar-brand" href="#" style="font-weight: bold;">Asky</a>
            <span class="navbar-text">Алишер Моргенштерн Тагирович</span>
            <button class="btn btn-outline-light">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
        
        </nav>
        
        <div class="container">
            <div class="row justify-content-center">
                <div class="card shadow-sm mt-5 card-hover-bg" style="cursor: pointer;">
                    <a href="/lesson/physics" class="stretched-link text-decoration-none"></a>
                    <div class="card-body p-4 d-flex justify-content-between align-items-center">
                        <h2 class="card-title mb-0">Англиийский язык бла бла бла бла бла</h2>
                        <button type="button" class="btn btn-outline-danger btn-lg ms-5 me-1 position-relative z-1" >
                            <div class="d-flex justify-content-between">
                                Удалить<i class="bi bi-trash"></i>
                            </div>
                        </button>
                    </div>
                </div>
            </div>

            <button type="button" class="btn btn-success rounded-circle position-fixed bottom-0 end-0 m-4 shadow-lg" data-bs-toggle="modal" data-bs-target="#newEventModal" style="width: 60px; height: 60px;">
                <div class="d-flex justify-content-center align-items-center">
                    <i class="bi bi-calendar-plus fs-2"></i>
                </div>
            </button>
            
            <div class="modal fade" id="newEventModal" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="exampleModalLabel">Новое мероприятие</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                        </div>
                        
                        <div class="modal-body">
                            <form>
                                <div class="mb-3">
                                    <label for="eventName" class="form-label">Название мероприятия</label>
                                    <input type="text" class="form-control" id="eventName" placeholder="Например: Лекция по физике">
                                </div>
                            </form>
                        </div>
                        
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                            <button type="button" class="btn btn-primary">Сохранить</button>
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>



        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
