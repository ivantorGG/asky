<!DOCTYPE html>
<html data-bs-theme="dark">
    <head>
        <title>Вход в аккаунт</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

        <style>
            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: hidden;
            }
        </style>
    </head>
    <body>
        <div id="loginError" class="alert alert-danger alert-dismissible fade d-none z-1 position-fixed top-50 start-50 translate-middle" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2 fs-2"></i>
                <span id="errorMessage" class="fs-2">Неверный email или пароль</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Закрыть" onclick="hideError()"></button>
        </div>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary d-none d-md-flex">
            <div class="container"> 
                <a class="navbar-brand" href="#" style="font-weight: bold;">Asky</a>
                <button class="btn btn-outline-light" onclick="location.href = '/register'">
                    <span>Регистрация</span>
                </button>
            </div>
        </nav>
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="card shadow-sm" style="height: 80vh;">
                    <div class="card-body p-4 d-flex flex-column justify-content-evenly">
                        <h2 class="card-title text-center mb-4" style="font-size: 7vw;">Вход</h2>
                        <div class="mt-auto">
                            <div class="p-2 d-flex">
                                <label class="me-1 fs-1" for="email">Email:</label>
                                <input class="ms-auto fs-1 me-1 flex-grow-1" type="email" id="email" name="email" required>
                            </div>
                            <div class="p-2 d-flex">
                                <label class="me-1 fs-1" for="password">Пароль:</label>
                                <input class="ms-auto fs-1 me-1 flex-grow-1" type="password" id="password" name="password" required>
                            </div>
                        </div>
                        <div class="d-grid gap-2 text-center mt-auto fs-1">
                            <button type="button" 
                            class="btn btn-primary btn-lg" 
                            onclick="tryToSend(document.getElementById('email').value, document.getElementById('password').value)">
                            <span class="fs-1">Войти</span>
                        </button>
                    </div>
                </div>
            </div>
            <a class="link-opacity-75 text-center fs-2" href="/register">Зарегистрироваться</a>
        </div>
        
        
    <script src="/static/js/speakerLog.js"></script>
    </body>
</html>
