<!DOCTYPE html>
<html data-bs-theme="dark">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="container mt-5">
        <div class="row justify-content-center">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4">Вход</h2>
                    <div class="mb-3 d-flex">
                        <label for="email">Email:</label>
                        <input class="ms-auto h-25" type="email" id="email" name="email" required>
                    </div>
                    <div class="mb-3 d-flex">
                        <label for="password">Введите пароль</label>
                        <input class="ms-auto h-25" type="password" id="password" name="password" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="button" 
                        class="btn btn-primary btn-lg" 
                        onclick="tryToSend(document.getElementById('email').value, document.getElementById('password').value)">
                        Войти
                    </button>
                </div>
            </div>
        </div>
        <a class="link-opacity-75 text-center" href="/register">Зарегистрироваться</a>
        <div id="loginError" class="alert alert-danger alert-dismissible fade d-none" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span id="errorMessage">Неверный email или пароль</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Закрыть" onclick="hideError()"></button>
        </div>
        
    <script src="/static/js/speakerLog.js"></script>
    </body>
</html>
