<script>

const commentsPanel = document.getElementById("commentsOffcanvas");


document.querySelector(".closeComments")
.addEventListener("click",()=>{

    closeComments();

});


function openPanel(){

    document.body.classList.add("comments-open");

    commentsPanel.classList.add("active");

}


function closeComments(){

    document.body.classList.remove("comments-open");

    commentsPanel.classList.remove("active");

}


</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>

const pathParts = window.location.pathname.split('/');
// Try to find UUID in the path first, fallback to segment 2
const uuidMatch = window.location.pathname.match(/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/);
const eventCode = uuidMatch ? uuidMatch[0] : (pathParts[2] || '');
const API_BASE = '/api';

let currentQuestionId = null;

const refreshPageBtn = document.getElementById("refreshPageBtn");

if (refreshPageBtn) {
  refreshPageBtn.addEventListener("click", e => {
    e.preventDefault();
    e.stopPropagation();
    window.location.reload();
  });
}

// дальше код без изменений...
// ---------------------- API -------------------------------

async function getQuestions() {
  try {
    const url = `${API_BASE}/events/${eventCode}/questions`;
    console.debug('Fetching questions from', url);
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`Ошибка загрузки: ${resp.status}`);
    return await resp.json();
  } catch (e) {
    console.error(e);
    return [];
  }
}

async function getEmail() {
  try {
    const resp = await fetch(`${API_BASE}/email`);
    if (!resp.ok) throw new Error(`Ошибка загрузки: ${resp.status}`);
    return await resp.json();
  } catch (e) {
    console.error(e);
    return [];
  }
}

async function addQuestion(text) {
  const resp = await fetch(`${API_BASE}/events/${eventCode}/questions`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      text
    })
  });

  if (!resp.ok)
    throw new Error("Ошибка добавления");

  return await resp.json();
}

async function likeQuestion(id) {

  const resp = await fetch(`${API_BASE}/questions/${id}/vote`, {
    method: "PUT"
  });

  if (!resp.ok)
    throw new Error("Ошибка лайка");

  return await resp.json();
}

async function unlikeQuestion(id) {

  const resp = await fetch(`${API_BASE}/questions/${id}/vote`, {
    method: "DELETE"
  });

  if (!resp.ok)
    throw new Error("Ошибка");

  return await resp.json();
}

function getVotedQuestions(){
  try{
    const raw = localStorage.getItem('voted_questions');
    return raw? JSON.parse(raw) : [];
  }catch(e){return []}
}

function isQuestionVoted(id){
  const arr = getVotedQuestions();
  return arr.indexOf(id) !== -1;
}

function addVotedQuestion(id){
  const arr = getVotedQuestions();
  if(arr.indexOf(id) === -1){ arr.push(id); localStorage.setItem('voted_questions', JSON.stringify(arr)); }
}

function removeVotedQuestion(id){
  let arr = getVotedQuestions();
  arr = arr.filter(x => x !== id);
  localStorage.setItem('voted_questions', JSON.stringify(arr));
}

async function getComments(id) {

  const resp = await fetch(`${API_BASE}/questions/${id}/comments`);

  if (!resp.ok)
    throw new Error("Ошибка");

  return await resp.json();
}

async function addComment(id, text) {

  const resp = await fetch(`${API_BASE}/questions/${id}/comments`, {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      text
    })

  });

  if (!resp.ok)
    throw new Error("Ошибка");

  return await resp.json();

}

// ---------------------- РЕНДЕР -------------------------------

async function renderQuestions() {

  const container = document.getElementById("questionsList");

  const questions = await getQuestions();


  if (!questions.length) {

    container.innerHTML = `

<div class="emptyQuestions">

<i class="bi bi-chat-left-dots"></i>

<h3>

Пока нет вопросов

</h3>

<p>

Будьте первым!

</p>

</div>

`;

    return;

  }

  container.innerHTML = "";

  questions.forEach(q => {

    const liked = q.is_voted || isQuestionVoted(q.id);

    const likes = q.votes || 0;

    const comments = q.comments
      ? q.comments.length
      : (q.comments_count || 0);

    container.insertAdjacentHTML("beforeend", `

<div class="questionCard" data-id="${q.id}">

<div class="questionText">

${q.text}

</div>

<div class="questionActions">

<div class="actionGroup">

<button
class="iconButton likeButton ${liked ? "active" : ""}"
data-id="${q.id}">

<i class="bi bi-heart-fill"></i>

<span class="likeCount">

${likes}

</span>

</button>

<button
class="iconButton commentButton"
data-id="${q.id}">

<i class="bi bi-chat-dots-fill"></i>

<span class="commentCount">

${comments}

</span>

</button>

</div>

</div>

</div>

`);

  });

}

async function setEmail() {
  try {
    const email = await getEmail();
    const emailInput = document.getElementById("email");
    
    if (emailInput) {
      emailInput.value = email; // Используем value для инпутов
    }
  } catch (error) {
    console.error("Ошибка при получении email:", error);
  }
}

// ---------------------- КОММЕНТАРИИ ----------------------------

async function openComments(id) {

  currentQuestionId = id;

  const comments = await getComments(id);

  const list = document.getElementById("commentsList");

  if (!comments.length) {

    list.innerHTML =
      "<p class='text-muted'>Комментариев пока нет</p>";

  } else {

    list.innerHTML = comments.map(c => `

<div class="comment">

<div class="commentAuthor">

Аноним

</div>

<div class="commentText">

${c.text}

</div>

</div>

`).join("");

  }

  openPanel();

}

// ---------------------- СОБЫТИЯ ----------------------------

document.addEventListener("click", async e => {

  const like = e.target.closest(".likeButton");

  if (like) {

    const id = Number(like.dataset.id);

    const voted = isQuestionVoted(id);

    if (voted) {
      await unlikeQuestion(id);
      removeVotedQuestion(id);
    } else {
      await likeQuestion(id);
      addVotedQuestion(id);
    }

    renderQuestions();

  }

});

document.addEventListener("click", e => {

  const btn = e.target.closest(".commentButton");

  if (!btn)
    return;

  openComments(Number(btn.dataset.id));

});

document.getElementById("questionForm")
.addEventListener("submit", async e => {

  e.preventDefault();

  const input = document.getElementById("input2");

  const text = input.value.trim();

  if (!text)
    return;

  await addQuestion(text);

  input.value = "";

  renderQuestions();

});



async function loadEventData() {
    const pathSegments = window.location.pathname.split('/').filter(segment => segment !== '');
    const studentIndex = pathSegments.indexOf('student');
    const eventCode = studentIndex > 0 ? pathSegments[studentIndex - 1] : pathSegments[pathSegments.length - 1];
    
    if (!eventCode) return;

    try {
        const linkResponse = await fetch(`/api/events/${eventCode}/link`);
        const linkData = await linkResponse.json();
        const qrResponse = await fetch(`/api/events/${eventCode}/qrcode`);
        const qrBlob = await qrResponse.blob();
        
        document.getElementById('eventQr').src = URL.createObjectURL(qrBlob);
        document.getElementById('eventQrMobile').src = URL.createObjectURL(qrBlob);
        
        const copyBtn = document.getElementById('copyLinkBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');

        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(linkData.link);
                
                // Анимация успеха
                copyBtn.classList.add('success');
                btnText.textContent = 'Скопировано!';
                btnIcon.className = 'bi bi-check2'; // Меняем иконку на галочку

                // Возвращаем всё назад через 2 секунды
                setTimeout(() => {
                    copyBtn.classList.remove('success');
                    btnText.textContent = 'Скопировать ссылку';
                    btnIcon.className = 'bi bi-link-45deg';
                }, 2000);
            } catch (err) {
                console.error('Ошибка копирования:', err);
            }
        });

    } catch (error) {
        console.error(error);
    }
}
document.addEventListener('DOMContentLoaded', loadEventData);




document.getElementById("commentForm")
.addEventListener("submit", async e => {

  e.preventDefault();

  const input = document.getElementById("commentInput");

  const text = input.value.trim();

  if (!text)
    return;

  await addComment(currentQuestionId, text);

  input.value = "";

  openComments(currentQuestionId);

  setEmail();

  renderQuestions();

});
function openFullScreenImage() {
  src = document.getElementById('eventQr').src

  const htmlContent = `
    <!DOCTYPE html>
    <html>
    <head>
      <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        img { width: 100vw; height: 100vh; object-fit: contain; }
      </style>
    </head>
    <body>
      <img src="${src}" />
    </body>
    </html>
  `;
  const newWindow = window.open('', '_blank');
  if (newWindow) {
    newWindow.document.write(htmlContent);
    newWindow.document.close();
  } else {
    window.open(src, '_blank');
  }
}
renderQuestions();
function openFullScreenImage(imgId = 'eventQr') {
  // Если id передан, берем его, иначе по умолчанию десктопный 'eventQr'
  const targetId = typeof imgId === 'string' ? imgId : 'eventQr';
  const src = document.getElementById(targetId).src;

  const htmlContent = `
    <!DOCTYPE html>
    <html>
    <head>
      <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        img { width: 100vw; height: 100vh; object-fit: contain; }
      </style>
    </head>
    <body>
      <img src="${src}" />
    </body>
    </html>
  `;
  const newWindow = window.open('', '_blank');
  if (newWindow) {
    newWindow.document.write(htmlContent);
    newWindow.document.close();
  } else {
    window.open(src, '_blank');
  }
}
</script>
