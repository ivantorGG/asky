<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ASKY</title>

    <link rel="stylesheet" href="/static/css/playerWinds.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

</head>

<body>

<canvas id="particles"></canvas>

<div class="gradient gradient1"></div>
<div class="gradient gradient2"></div>
<div class="gradient gradient3"></div>

<header>

    <div class="logo">

        <div class="logoText">

            <div class="logoTitle">
                ASKY
            </div>

            <div class="logoSubtitle">
                Student View
            </div>

        </div>

    </div>

    <div class="headerRight">

        <div class="eventTitle">
            Анонимные вопросы
        </div>

        <div class="studentName">
            {имя фамилия}
        </div>

        <button class="themeToggle" id="themeToggle">

            <i class="bi bi-moon-stars"></i>

        </button>

        <button class="logoutButton" onclick="logout()">

            <i class="bi bi-box-arrow-right"></i>

        </button>

    </div>

</header>

<script src="/static/js/logout.js"></script>

<main class="page">

<div class="pageGrid">

<!-- =======================================================
LEFT
======================================================= -->

<aside class="leftColumn">

<div class="glassCard qrCard">

<h5>

<i class="bi bi-qr-code"></i>

QR мероприятия

</h5>

<img
class="qrImage"
src="https://upload.wikimedia.org/wikipedia/commons/5/5e/QR_Code_example.png">

<a
class="lectureLink"
href="https://upload.wikimedia.org/wikipedia/commons/5/5e/QR_Code_example.png">

<i class="bi bi-link-45deg"></i>

Открыть лекцию

</a>

</div>

</aside>

<!-- =======================================================
RIGHT
======================================================= -->

<section class="questionsColumn">

<div class="questionsHeader">

<div>

<h2>

Вопросы

</h2>

<div class="questionCounter">

Все вопросы мероприятия

</div>

</div>

</div>

<div
class="questionsList"
id="questionsList">

</div>

</section>

</div>

</main>

<form
class="questionForm"
id="questionForm">

<div class="questionInput">

<textarea
id="input2"
rows="1"
placeholder="Напишите вопрос анонимно..."
required></textarea>

<button
class="sendButton"
type="submit">

<i class="bi bi-send-fill"></i>

</button>

</div>

</form>

<div
class="offcanvas offcanvas-end"
tabindex="-1"
id="commentsOffcanvas">

<div class="offcanvas-header">

<h5>

<i class="bi bi-chat-dots"></i>

Комментарии

</h5>

<button
type="button"
class="btn-close"
data-bs-dismiss="offcanvas">

</button>

</div>

<div class="offcanvas-body">

<div id="commentsList">

<p class="text-muted">

Комментариев пока нет

</p>

</div>

<form
id="commentForm"
class="commentForm">

<input
type="text"
id="commentInput"
placeholder="Напишите комментарий...">

<button
type="submit">

Отправить

</button>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>

const pathParts = window.location.pathname.split('/');
const eventCode = pathParts[2];
const API_BASE = '/api';

let currentQuestionId = null;

// дальше код без изменений...
// ---------------------- API -------------------------------

async function getQuestions() {
  try {
    const resp = await fetch(`${API_BASE}/events/${eventCode}/questions`);
    if (!resp.ok) throw new Error(`Ошибка загрузки: ${resp.status}`);
    return await resp.json();
  } catch (e) {
    console.error(e);
    return [];
  }
}

async function addQuestion(text) {
  const resp = await fetch(`${API_BASE}/events/${eventCode}/questions`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      text
    })
  });

  if (!resp.ok)
    throw new Error("Ошибка добавления");

  return await resp.json();
}

async function likeQuestion(id) {

  const resp = await fetch(`${API_BASE}/questions/${id}/vote`, {
    method: "PUT"
  });

  if (!resp.ok)
    throw new Error("Ошибка лайка");

  return await resp.json();
}

async function unlikeQuestion(id) {

  const resp = await fetch(`${API_BASE}/questions/${id}/vote`, {
    method: "DELETE"
  });

  if (!resp.ok)
    throw new Error("Ошибка");

  return await resp.json();
}

function getVotedQuestions(){
  try{
    const raw = localStorage.getItem('voted_questions');
    return raw? JSON.parse(raw) : [];
  }catch(e){return []}
}

function isQuestionVoted(id){
  const arr = getVotedQuestions();
  return arr.indexOf(id) !== -1;
}

function addVotedQuestion(id){
  const arr = getVotedQuestions();
  if(arr.indexOf(id) === -1){ arr.push(id); localStorage.setItem('voted_questions', JSON.stringify(arr)); }
}

function removeVotedQuestion(id){
  let arr = getVotedQuestions();
  arr = arr.filter(x => x !== id);
  localStorage.setItem('voted_questions', JSON.stringify(arr));
}

async function getComments(id) {

  const resp = await fetch(`${API_BASE}/questions/${id}/comments`);

  if (!resp.ok)
    throw new Error("Ошибка");

  return await resp.json();
}

async function addComment(id, text) {

  const resp = await fetch(`${API_BASE}/questions/${id}/comments`, {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      text
    })

  });

  if (!resp.ok)
    throw new Error("Ошибка");

  return await resp.json();

}

// ---------------------- РЕНДЕР -------------------------------

async function renderQuestions() {

  const container = document.getElementById("questionsList");

  const questions = await getQuestions();

  if (!questions.length) {

    container.innerHTML = `

<div class="emptyQuestions">

<i class="bi bi-chat-left-dots"></i>

<h3>

Пока нет вопросов

</h3>

<p>

Будьте первым!

</p>

</div>

`;

    return;

  }

  container.innerHTML = "";

  questions.forEach(q => {

    const liked = q.is_voted || isQuestionVoted(q.id);

    const likes = q.votes || 0;

    const comments = q.comments
      ? q.comments.length
      : (q.comments_count || 0);

    container.insertAdjacentHTML("beforeend", `

<div class="questionCard" data-id="${q.id}">

<div class="questionText">

${q.text}

</div>

<div class="questionActions">

<div class="actionGroup">

<button
class="iconButton likeButton ${liked ? "active" : ""}"
data-id="${q.id}">

<i class="bi bi-heart-fill"></i>

<span class="likeCount">

${likes}

</span>

</button>

<button
class="iconButton commentButton"
data-id="${q.id}">

<i class="bi bi-chat-dots-fill"></i>

<span class="commentCount">

${comments}

</span>

</button>

</div>

</div>

</div>

`);

  });

}

// ---------------------- КОММЕНТАРИИ ----------------------------

async function openComments(id) {

  currentQuestionId = id;

  const comments = await getComments(id);

  const list = document.getElementById("commentsList");

  if (!comments.length) {

    list.innerHTML =
      "<p class='text-muted'>Комментариев пока нет</p>";

  } else {

    list.innerHTML = comments.map(c => `

<div class="comment">

<div class="commentAuthor">

Аноним

</div>

<div class="commentText">

${c.text}

</div>

</div>

`).join("");

  }

  new bootstrap.Offcanvas(
    document.getElementById("commentsOffcanvas")
  ).show();

}

// ---------------------- СОБЫТИЯ ----------------------------

document.addEventListener("click", async e => {

  const like = e.target.closest(".likeButton");

  if (like) {

    const id = Number(like.dataset.id);

    const voted = isQuestionVoted(id);

    if (voted) {
      await unlikeQuestion(id);
      removeVotedQuestion(id);
    } else {
      await likeQuestion(id);
      addVotedQuestion(id);
    }

    renderQuestions();

  }

});

document.addEventListener("click", e => {

  const btn = e.target.closest(".commentButton");

  if (!btn)
    return;

  openComments(Number(btn.dataset.id));

});

document.getElementById("questionForm")
.addEventListener("submit", async e => {

  e.preventDefault();

  const input = document.getElementById("input2");

  const text = input.value.trim();

  if (!text)
    return;

  await addQuestion(text);

  input.value = "";

  renderQuestions();

});

document.getElementById("commentForm")
.addEventListener("submit", async e => {

  e.preventDefault();

  const input = document.getElementById("commentInput");

  const text = input.value.trim();

  if (!text)
    return;

  await addComment(currentQuestionId, text);

  input.value = "";

  openComments(currentQuestionId);

  renderQuestions();

});

renderQuestions();

</script>

<script src="/static/js/playerWinds.js"></script>
<script src="/static/js/themeSwitcher.js"></script>

</body>

</html>
