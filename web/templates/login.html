<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Вход — ASKY</title>

    <link rel="icon" href="/static/img/favicon.ico">

    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="/static/css/login.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
          rel="stylesheet">
    <script src="/static/js/themeSwitcher.js"></script>

</head>

<body>

<canvas id="particles"></canvas>

<div class="gradient gradient1"></div>
<div class="gradient gradient2"></div>
<div class="gradient gradient3"></div>

<header>

    <div class="logo">
        <a href="/" class="logo">ASKY</a>
    </div>

    <nav>


        <button
                id="themeToggle"
                class="themeToggle"
                type="button">

            ☀️

        </button>

        <a href="/register" class="loginButton">

            Регистрация

        </a>

    </nav>

</header>

<main class="loginPage">

    <div class="loginBackgroundText">


    </div>

    <section class="loginCard">

        <div class="loginHeader">

            <div class="badge">

                С возвращением

            </div>

            <h1>

                Войдите

            </h1>

            <p>

                в аккаунт, чтобы продолжить работу

            </p>

        </div>

        <form id="loginForm">

            <div class="inputGroup">

                <label>

                    Электронная почта

                </label>

                <input
                        id="email"
                        type="email"
                        placeholder="example@mail.com"
                        autocomplete="email">

            </div>

            <div class="inputGroup">

                <label>

                    Пароль

                </label>

                <input
                        id="password"
                        type="password"
                        placeholder="******"
                        autocomplete="current-password">

            </div>

            <div
                    class="errorBox"
                    id="loginError">

                <span id="errorMessage"></span>

            </div>

            <button
                    class="loginButtonMain"
                    type="submit">

                Войти

            </button>

        </form>

        <div class="loginFooter">

            Нет аккаунта?

            <a href="/register">

                Зарегистрироваться

            </a>

        </div>

        

    </section>

    

</main>

<footer>

        <div class="footerTitle">

            <span class="desktop-text">ASKY</span>
        <span class="mobile-text">ASKY</span>

        </div>

        <p>

            Платформа для анонимных вопросов. Все права защищены &copy; 2026

        </p>

    </footer>

<script src="/static/js/themeSwitcher.js"></script>
<script src="/static/js/index.js"></script>
<script src="/static/js/login.js"></script>

</body>
</html>
