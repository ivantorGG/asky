<!DOCTYPE html>
<html lang="ru" data-theme="dark">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ASKY • Регистрация</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/register.css">

</head>

<body>

<canvas id="particles"></canvas>

<div class="gradient gradient1"></div>
<div class="gradient gradient2"></div>
<div class="gradient gradient3"></div>

<header>

    <a href="/" class="logo">

        <img src="/static/img/logo.png">

        <span>ASKY</span>

    </a>

    <button id="themeToggle">

        🌙

    </button>

</header>

<div class="backgroundTitle">

    REGISTER

</div>

<main>

    <div class="registerCard">

        <div class="cardGlow"></div>

        <div class="badge">

            Speaker Account

        </div>

        <h1>

            Create Account

        </h1>

        <p class="subtitle">

            Create your Asky account and start hosting interactive lectures.

        </p>

        <div class="inputGroup">

            <label>Email</label>

            <input
                    id="email"
                    type="email"
                    placeholder="example@mail.com"
            >

        </div>

        <div class="inputGroup">

            <label>Password</label>

            <input
                    id="password"
                    type="password"
                    placeholder="Minimum 6 characters"
            >

        </div>

        <button
                class="registerButton"

                onclick="tryToSend(
                document.getElementById('email').value,
                document.getElementById('password').value
            )">

            Create Account

        </button>

        <a class="loginLink" href="/login">

            Already have an account?
            <span>Sign In</span>

        </a>

        <div id="loginError" class="errorBox">

            <svg viewBox="0 0 24 24">

                <path d="M12 2L1 21h22L12 2zm1 15h-2v2h2v-2zm0-8h-2v6h2V9z"/>

            </svg>

            <span id="errorMessage">

                Error

            </span>

        </div>

    </div>

</main>

<script src="/static/js/speakerReg.js"></script>

</body>

</html>
