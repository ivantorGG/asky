<!DOCTYPE html>
<html lang="ru" data-theme="dark">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ASKY • Регистрация</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/register.css">

</head>

<body>

<canvas id="particles"></canvas>

<div class="gradient gradient1"></div>
<div class="gradient gradient2"></div>
<div class="gradient gradient3"></div>

<header>

    <a href="/" class="logo">

        <img src="/static/img/logo.png">

        <span>ASKY</span>

    </a>

    <button id="themeToggle">

        🌙

    </button>

</header>

<div class="backgroundTitle">

    REGISTER

</div>

<main>

    <div class="registerCard">

        <div class="cardGlow"></div>

        <div class="badge">

            Speaker Account

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

        <style>
            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: hidden;
            }
        </style>
    </head>
    <body>
        <div id="loginError" class="alert alert-danger alert-dismissible fade d-none z-1 position-fixed top-50 start-50 translate-middle" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2 fs-2"></i>
                <span id="errorMessage" class="fs-2">Неверный email или пароль</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Закрыть" onclick="hideError()"></button>
        </div>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container"> 
                <a class="navbar-brand" href="#" style="font-weight: bold;">Asky</a>
                <button class="btn btn-outline-light" onclick="location.href = '/login'">
                    <span>Войти</span>
                </button>
            </div>
        </nav>

        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="card shadow-sm" style="height: 80vh;">
                    <div class="card-body p-4 d-flex flex-column justify-content-evenly">
                        <h2 class="card-title text-center mb-4" style="font-size: 7vw;">Регистрация</h2>
                        <div class="mt-auto">
                            <div class="p-2 d-flex">
                                <label class="me-1 fs-1" for="email">Email:</label>
                                <input class="ms-auto flex-grow-1 me-1 fs-1" type="email" id="email" name="email" required>
                            </div>
                            
                            <div class="p-2 d-flex">
                                <label for="password"  class="fs-1">Пароль:</label>
                                <input class="ms-auto flex-grow-1 me-1 fs-1" type="password" id="password" name="password" required minlength="6">
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2 text-center mt-auto fs-1">
                            <button type="button" 
                            class="btn btn-primary btn-lg" 
                            onclick="tryToSend(document.getElementById('email').value, document.getElementById('password').value)">
                            <span class="d-flex justify-content-center align-items-center fs-1">Зарегистрироваться</span>
                        </button>
                        </div>
                    </div>
                </div>
                <a class="link-opacity-75 text-center fs-2" href="/login">Войти в существующий аккаунт</a>
            </div>
        </div>
        
    <script src="/static/js/speakerReg.js"></script>
    </body>
</html>
