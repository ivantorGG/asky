{{define "base"}}
<!DOCTYPE html>
<html data-bs-theme="dark">
    <head>
        <!-- Динамический заголовок страницы -->
        <title>{{template "title" .}}</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="shortcut icon" type="image/x-icon" href="/static/img/favicon.ico">
    </head>
    <body class="container mt-5">
        <div class="row justify-content-center">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <div class="text-end mb-3">
                        <button id="themeToggle" class="btn btn-outline-secondary btn-sm">🌙 Темная тема</button>
                    </div>
                    
                    <!-- Сюда вставляется уникальная форма/контент -->
                    {{template "content" .}}

                </div>
            </div>
            
            <!-- Сюда вставляются уникальные ссылки под карточкой и ошибки -->
            {{template "footer_links" .}}
        </div>

        <!-- Общие скрипты, специфичные для конкретной страницы -->
        {{template "scripts" .}}
        <script src="/static/js/themeSwitcher.js"></script>
    </body>
</html>
{{end}}
